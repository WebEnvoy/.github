name: Chore
description: Repository setup, automation, maintenance, or housekeeping.
title: "Chore: "
labels: ["status: needs-triage", "area: infra"]
type: "Chore"
body:
  - type: textarea
    id: work
    attributes:
      label: Work item
      description: What maintenance or setup work is needed?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which repositories, settings, scripts, or automation are affected?
    validations:
      required: false

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How do we confirm this is complete?
    validations:
      required: false
