name: Decision
description: Product, architecture, repository, licensing, or workflow decision.
title: "Decision: "
labels: ["status: needs-decision"]
body:
  - type: textarea
    id: question
    attributes:
      label: Decision question
      description: What exactly needs to be decided?
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Options
      description: List viable options and tradeoffs.
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation
      description: State the recommended option if one exists.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Repositories, APIs, schemas, runtime behavior, licensing, or user impact.
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Decision outcome
      description: Fill this after the decision is made.
    validations:
      required: false
