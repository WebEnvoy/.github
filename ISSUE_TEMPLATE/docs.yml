name: Docs
description: Documentation-only change.
title: "Docs: "
labels: ["status: needs-triage", "area: docs"]
body:
  - type: textarea
    id: target
    attributes:
      label: Target document
      description: Which document should change?
    validations:
      required: true

  - type: textarea
    id: change
    attributes:
      label: Requested change
      description: What needs to be added, removed, clarified, or moved?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: Why is this documentation change needed?
    validations:
      required: false

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How do we confirm the docs are correct?
    validations:
      required: false
