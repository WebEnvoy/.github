name: FR
description: Feature Requirement that can be delivered under a Phase.
title: "FR: "
type: "FR"
body:
  - type: markdown
    attributes:
      value: |
        Use this for a concrete feature requirement. An FR can contain multiple Work Item issues.

  - type: input
    id: parent
    attributes:
      label: Parent phase
      description: Link the parent Phase issue if this FR belongs to one.
      placeholder: "https://github.com/WebEnvoy/<repo>/issues/..."
    validations:
      required: false

  - type: textarea
    id: requirement
    attributes:
      label: Requirement
      description: What capability, behavior, API, package feature, or user-visible outcome is required?
    validations:
      required: true

  - type: textarea
    id: users
    attributes:
      label: Users / callers
      description: Who or what consumes this FR?
      placeholder: "Agent, WebEnvoy Core, Harbor Runtime API, Lode maintainer, Console operator, SDK user..."
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this FR is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: work_items
    attributes:
      label: Expected work items
      description: List expected Work Item issues if known.
    validations:
      required: false
