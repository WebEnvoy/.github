name: Feature request
description: Propose a capability, runtime feature, or repository improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or system problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - webenvoy
        - Harbor
        - lode
        - .github
        - unsure
    validations:
      required: true
