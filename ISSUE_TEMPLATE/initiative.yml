name: Initiative
description: Cross-repository objective or organization-level work.
title: "Initiative: "
labels: ["status: needs-triage", "track: governance"]
type: "Initiative"
body:
  - type: markdown
    attributes:
      value: |
        Use this for cross-repository objectives. Product-specific execution should be split into Phase issues in the owning repositories.

  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What organization-level outcome should this initiative produce?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which repositories, products, contracts, or workflows are affected?
      placeholder: |
        Repositories:
        - WebEnvoy/WebEnvoy
        - WebEnvoy/Harbor
        - WebEnvoy/Lode
    validations:
      required: true

  - type: textarea
    id: phases
    attributes:
      label: Expected phases
      description: List expected Phase issues if known.
      placeholder: |
        - Phase: Runtime Session API
        - Phase: Browser Driver abstraction
    validations:
      required: false

  - type: textarea
    id: decisions
    attributes:
      label: Required decisions
      description: Link or list decisions that must be made.
    validations:
      required: false

  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: What must be true before this initiative can close?
    validations:
      required: true
