name: Phase
description: Stage-level work block under an Initiative.
title: "Phase: "
labels: ["status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for a stage-level work block. A Phase can contain multiple FR issues.

  - type: input
    id: parent
    attributes:
      label: Parent initiative
      description: Link the parent Initiative issue if this phase belongs to one.
      placeholder: "https://github.com/WebEnvoy/.github/issues/..."
    validations:
      required: false

  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should this phase produce?
    validations:
      required: true

  - type: textarea
    id: frs
    attributes:
      label: Expected FRs
      description: List expected FR issues if known.
      placeholder: |
        - FR: create runtime session
        - FR: close runtime session
    validations:
      required: false

  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries
      description: What is explicitly out of scope?
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How will this phase be validated?
    validations:
      required: false
