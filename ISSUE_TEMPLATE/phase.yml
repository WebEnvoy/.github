name: Phase
description: Stage-level work block.
title: "Phase: "
type: "Phase"
body:
  - type: markdown
    attributes:
      value: |
        Use this for a stage-level work block. A Phase can contain multiple FR issues.

  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What should this phase produce?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which repositories, modules, contracts, or workflows are affected?
    validations:
      required: true

  - type: textarea
    id: frs
    attributes:
      label: Expected FRs
      description: List expected FR issues if known.
      placeholder: |
        - FR: create runtime session
        - FR: close runtime session
    validations:
      required: false

  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries
      description: What is explicitly out of scope?
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How will this phase be validated?
    validations:
      required: false
