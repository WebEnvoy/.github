name: Research
description: External project research, technical investigation, or comparison.
title: "Research: "
labels: ["status: needs-triage", "track: research", "area: research"]
type: "Research"
body:
  - type: textarea
    id: question
    attributes:
      label: Research question
      description: What should this research answer?
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Target
      description: Repository, product, technology, paper, dataset, or topic.
      placeholder: "owner/repo, product name, or topic"
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Expected output
      description: What should be produced?
      placeholder: |
        - project analysis
        - comparison
        - decision candidate
    validations:
      required: true

  - type: textarea
    id: consumers
    attributes:
      label: Expected consumers
      description: Which repository, decision, phase, or FR may use the result?
    validations:
      required: false
