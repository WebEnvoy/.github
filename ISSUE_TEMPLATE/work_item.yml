name: Work Item
description: Executable work item under an FR or Phase.
title: "Work Item: "
type: "Work Item"
body:
  - type: input
    id: parent
    attributes:
      label: Parent FR or Phase
      description: Link the parent FR or Phase issue if applicable.
      placeholder: "https://github.com/WebEnvoy/<repo>/issues/..."
    validations:
      required: false

  - type: textarea
    id: work
    attributes:
      label: Work
      description: What should be implemented, fixed, validated, researched, documented, or maintained?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link relevant docs, decisions, research, schemas, parent issues, or PRs.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this work item is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How should this be tested or reviewed?
    validations:
      required: false
