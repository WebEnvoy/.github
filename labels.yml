# WebEnvoy organization label schema

# status / triage
- name: "status: needs-triage"
  color: "ededed"
  description: "Needs initial review and classification."

- name: "status: accepted"
  color: "c2e0c6"
  description: "Accepted as valid work but not necessarily scheduled."

- name: "status: blocked"
  color: "d93f0b"
  description: "Blocked by another task, decision, dependency, or external condition."

- name: "status: needs-decision"
  color: "fbca04"
  description: "Requires a product, architecture, repository, or licensing decision."

# priority
- name: "priority: p0"
  color: "b60205"
  description: "Critical for the current foundation or release."

- name: "priority: p1"
  color: "d93f0b"
  description: "Important and should be handled soon."

- name: "priority: p2"
  color: "fbca04"
  description: "Useful but not blocking immediate progress."

- name: "priority: p3"
  color: "cfd3d7"
  description: "Low priority or backlog."

# track
- name: "track: foundation"
  color: "1d76db"
  description: "Repository setup, contracts, governance, CI, release foundation."

- name: "track: runtime"
  color: "5319e7"
  description: "Harbor runtime, browser session, profile, identity, drivers, evidence."

- name: "track: capability"
  color: "0e8a16"
  description: "Lode capability assets, task packages, site packages, validation."

- name: "track: product"
  color: "0052cc"
  description: "Console, CLI, UX, human-facing workflow, packaging."

- name: "track: ecosystem"
  color: "006b75"
  description: "SDKs, contracts, integrations, public package ecosystem."

- name: "track: research"
  color: "7057ff"
  description: "Research, external project analysis, comparison, decision candidates."

- name: "track: governance"
  color: "cfd3d7"
  description: "Organization rules, repository map, licensing, contribution policy."

