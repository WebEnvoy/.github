# impact
- name: "impact: breaking"
  color: "b60205"
  description: "Breaking API, schema, package, contract, or workflow change."

- name: "impact: public-api"
  color: "d93f0b"
  description: "Affects public API, SDK, CLI, MCP, or external integration."

- name: "impact: security"
  color: "b60205"
  description: "Security-sensitive behavior, credentials, session state, or access boundary."

- name: "impact: data-boundary"
  color: "d93f0b"
  description: "Affects user data, evidence, profile state, credentials, or privacy boundary."

- name: "impact: licensing"
  color: "fbca04"
  description: "Affects license, repository visibility, dependency licensing, or public/private boundary."
